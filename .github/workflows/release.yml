name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS Build
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npx eas-cli@latest install

      - name: Build Android (APK)
        run: eas build --platform android --profile preview --non-interactive

      - name: Download build artifact
        run: eas build:list --status succeeded --limit 1 --json | tail -1 | jq -r '.[0].artifacts.buildUrl' | xargs curl -L -o app.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v1
        with:
          files: app.apk
          body: "Android APK build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS Build
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install EAS CLI
        run: npx eas-cli@latest install

      - name: Build iOS (IPA)
        run: eas build --platform ios --profile preview --non-interactive

      - name: Download build artifact
        run: eas build:list --status succeeded --limit 1 --json | tail -1 | jq -r '.[0].artifacts.buildUrl' | xargs curl -L -o app.ipa

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v1
        with:
          files: app.ipa
          body: "iOS IPA build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
